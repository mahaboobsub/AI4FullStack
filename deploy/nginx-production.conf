# BloodBridge AI — Production Nginx Configuration
# This config serves both Frontend (static) + Backend (proxy) from one domain.
# Replace YOUR_DOMAIN with your actual domain (e.g., bloodbridge-api.duckdns.org)

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge (Certbot auto-creates this)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL (Certbot will fill these in)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10m;

    # ── Backend API proxy ────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Health check proxy ───────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ── WebSocket proxy (live dashboard updates) ─────────────────
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # ── Webhook proxy (Telegram, Vapi, Bolna) ────────────────────
    location /webhook/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    # ── Frontend static files (React SPA) ────────────────────────
    root /var/www/bloodbridge;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Gzip compression ─────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1000;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
