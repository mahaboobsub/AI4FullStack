server {
    listen 80;
    server_name api.bloodbridge.ai;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name api.bloodbridge.ai;

    # Certbot managed certificates
    ssl_certificate /etc/letsencrypt/live/api.bloodbridge.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bloodbridge.ai/privkey.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # WebSocket support
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Gzip JSON responses
    gzip on;
    gzip_types application/json text/plain text/html;
    gzip_min_length 1000;
}
